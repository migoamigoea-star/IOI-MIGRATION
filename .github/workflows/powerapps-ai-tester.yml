name: Power Apps AI Test Agent

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "testing/**"
      - "**_blueprint.md"
      - "user_stories/**"

  pull_request:
    branches:
      - main
    paths:
      - "testing/**"
      - "**_blueprint.md"
      - "user_stories/**"

  # Nightly run against TEST environment
  schedule:
    - cron: "0 0 * * *"

  # Manual trigger with configurable target
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (DEV / TEST / PROD)"
        required: true
        default: "TEST"
        type: choice
        options:
          - DEV
          - TEST
          - PROD
      app_form_code:
        description: "Form code to test (e.g. IOIP). Leave blank to test all apps."
        required: false
        default: ""
      generate_tests:
        description: "Auto-generate additional test cases with AI before running?"
        required: false
        default: "false"
        type: boolean

# ─────────────────────────────────────────────────────────────────────────────
# Global defaults
# ─────────────────────────────────────────────────────────────────────────────
env:
  DOTNET_VERSION: "8.0.x"
  PYTHON_VERSION: "3.11"
  RESULTS_BASE: "testing/results"

permissions:
  contents: read
  pull-requests: write   # needed to post PR comments

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Discover which apps have a testplan.yaml
  # ───────────────────────────────────────────────────────────────────────────
  discover-apps:
    name: Discover Apps to Test
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test matrix
        id: set-matrix
        shell: python
        run: |
          import json, os, pathlib

          form_code_filter = "${{ github.event.inputs.app_form_code }}".strip()
          test_dir = pathlib.Path("testing/test-engine/tests")

          apps = []
          for plan in sorted(test_dir.glob("*/testplan.yaml")):
              form_code = plan.parent.name
              blueprint = f"{form_code}_blueprint.md"
              user_story = f"user_stories/{form_code}_user_story.md"
              apps.append({
                  "form_code": form_code,
                  "test_plan": str(plan),
                  "blueprint": blueprint if pathlib.Path(blueprint).exists() else "",
                  "user_story": user_story if pathlib.Path(user_story).exists() else "",
              })

          if form_code_filter:
              apps = [a for a in apps if a["form_code"] == form_code_filter]

          matrix = {"include": apps} if apps else {"include": [{"form_code": "NONE"}]}
          print(f"Discovered apps: {[a['form_code'] for a in apps]}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: (Optional) AI test-case generation
  # ───────────────────────────────────────────────────────────────────────────
  generate-tests:
    name: "AI: Generate Tests — ${{ matrix.form_code }}"
    runs-on: ubuntu-latest
    needs: discover-apps
    if: >
      github.event.inputs.generate_tests == 'true' &&
      fromJson(needs.discover-apps.outputs.matrix).include[0].form_code != 'NONE'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-apps.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: testing/agent/requirements.txt

      - name: Install AI agent dependencies
        run: pip install -r testing/agent/requirements.txt

      - name: Generate test cases
        if: matrix.blueprint != '' && matrix.user_story != ''
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT || 'gpt-4o' }}
        run: |
          python testing/agent/ai_test_agent.py \
            --mode generate \
            --blueprint "${{ matrix.blueprint }}" \
            --user-story "${{ matrix.user_story }}" \
            --output "testing/test-engine/tests/${{ matrix.form_code }}/generated_tests.yaml"

      - name: Upload generated test plan
        uses: actions/upload-artifact@v4
        with:
          name: generated-tests-${{ matrix.form_code }}
          path: testing/test-engine/tests/${{ matrix.form_code }}/generated_tests.yaml
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: Run Power Apps Test Engine + AI analysis
  # ───────────────────────────────────────────────────────────────────────────
  run-tests:
    name: "Test — ${{ matrix.form_code }}"
    runs-on: ubuntu-latest
    needs: discover-apps
    if: fromJson(needs.discover-apps.outputs.matrix).include[0].form_code != 'NONE'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-apps.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: testing/agent/requirements.txt

      - name: Install AI agent dependencies
        run: pip install -r testing/agent/requirements.txt

      - name: Install Power Platform CLI (pac)
        run: |
          if ! dotnet tool list --global | grep -q "Microsoft.PowerApps.CLI.Tool"; then
            dotnet tool install --global Microsoft.PowerApps.CLI.Tool \
              --add-source https://api.nuget.org/v3/index.json
          else
            echo "pac already installed, skipping."
          fi

      - name: Install Power Apps Test Engine
        run: |
          if ! dotnet tool list --global | grep -q "Microsoft.PowerApps.TestEngine"; then
            dotnet tool install --global Microsoft.PowerApps.TestEngine \
              --add-source https://pkgs.dev.azure.com/PowerAppsTestEngine/PowerAppsTestEngine/_packaging/PowerAppsTestEngine/nuget/v3/index.json
          else
            echo "Test Engine already installed, skipping."
          fi

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Authenticate to Power Platform
        env:
          POWERAPPS_TENANT_ID: ${{ secrets.POWERAPPS_TENANT_ID }}
          POWERAPPS_CLIENT_ID: ${{ secrets.POWERAPPS_CLIENT_ID }}
          POWERAPPS_CLIENT_SECRET: ${{ secrets.POWERAPPS_CLIENT_SECRET }}
          POWERAPPS_ENVIRONMENT_URL: ${{ secrets.POWERAPPS_ENVIRONMENT_URL }}
        run: |
          pac auth create \
            --tenant "$POWERAPPS_TENANT_ID" \
            --applicationId "$POWERAPPS_CLIENT_ID" \
            --clientSecret "$POWERAPPS_CLIENT_SECRET" \
            --environment "$POWERAPPS_ENVIRONMENT_URL" \
            --name "ci-agent"

      - name: Run Power Apps Test Engine — baseline tests
        id: run-baseline
        continue-on-error: true
        env:
          POWERAPPS_TENANT_ID: ${{ secrets.POWERAPPS_TENANT_ID }}
          POWERAPPS_ENVIRONMENT_ID: ${{ secrets.POWERAPPS_ENVIRONMENT_ID }}
          TESTENGINE_USER1_EMAIL: ${{ secrets.TESTENGINE_USER1_EMAIL }}
          TESTENGINE_USER1_PASSWORD: ${{ secrets.TESTENGINE_USER1_PASSWORD }}
        run: |
          pac test run \
            --provider "Canvas" \
            --tenant "$POWERAPPS_TENANT_ID" \
            --environment-id "$POWERAPPS_ENVIRONMENT_ID" \
            --test-plan-file "testing/test-engine/tests/common/baseline_tests.yaml" \
            --config-file "testing/test-engine/testconfig.json" \
            --output-directory "${{ env.RESULTS_BASE }}/${{ matrix.form_code }}/baseline" \
          || echo "BASELINE_FAILED=true" >> "$GITHUB_ENV"

      - name: Run Power Apps Test Engine — app-specific tests
        id: run-app-tests
        continue-on-error: true
        env:
          POWERAPPS_TENANT_ID: ${{ secrets.POWERAPPS_TENANT_ID }}
          POWERAPPS_ENVIRONMENT_ID: ${{ secrets.POWERAPPS_ENVIRONMENT_ID }}
          TESTENGINE_USER1_EMAIL: ${{ secrets.TESTENGINE_USER1_EMAIL }}
          TESTENGINE_USER1_PASSWORD: ${{ secrets.TESTENGINE_USER1_PASSWORD }}
          TESTENGINE_APPROVER_EMAIL: ${{ secrets.TESTENGINE_APPROVER_EMAIL }}
          TESTENGINE_APPROVER_PASSWORD: ${{ secrets.TESTENGINE_APPROVER_PASSWORD }}
        run: |
          pac test run \
            --provider "Canvas" \
            --tenant "$POWERAPPS_TENANT_ID" \
            --environment-id "$POWERAPPS_ENVIRONMENT_ID" \
            --test-plan-file "${{ matrix.test_plan }}" \
            --config-file "testing/test-engine/testconfig.json" \
            --output-directory "${{ env.RESULTS_BASE }}/${{ matrix.form_code }}/app" \
          || echo "APP_TESTS_FAILED=true" >> "$GITHUB_ENV"

      - name: Merge test results for AI analysis
        run: |
          mkdir -p "${{ env.RESULTS_BASE }}/${{ matrix.form_code }}/merged/screenshots"
          # Copy all screenshots into merged dir
          find "${{ env.RESULTS_BASE }}/${{ matrix.form_code }}" \
            -name "*.png" \
            -exec cp {} "${{ env.RESULTS_BASE }}/${{ matrix.form_code }}/merged/screenshots/" \;
          # Merge JSON results
          python3 - <<'EOF'
          import json, pathlib, sys
          results_dir = pathlib.Path("${{ env.RESULTS_BASE }}/${{ matrix.form_code }}")
          combined = {"testSuites": []}
          for p in results_dir.glob("*/testResults.json"):
              try:
                  data = json.loads(p.read_text())
                  combined["testSuites"].append({"source": str(p), "data": data})
              except Exception as e:
                  print(f"Warning: could not parse {p}: {e}", file=sys.stderr)
          out = results_dir / "merged" / "testResults.json"
          out.write_text(json.dumps(combined, indent=2))
          print(f"Merged results written to {out}")
          EOF

      - name: Run AI bug analysis
        id: ai-analysis
        continue-on-error: true
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT || 'gpt-4o' }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          python testing/agent/ai_test_agent.py \
            --mode analyse \
            --results-dir "${{ env.RESULTS_BASE }}/${{ matrix.form_code }}/merged" \
            ${{ matrix.blueprint && format('--blueprint "{0}"', matrix.blueprint) || '' }} \
            ${{ matrix.user_story && format('--user-story "{0}"', matrix.user_story) || '' }}

      - name: Upload test results and AI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.form_code }}
          path: ${{ env.RESULTS_BASE }}/${{ matrix.form_code }}/
          retention-days: 30

      - name: Post PR comment with AI report
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentFile = `${{ env.RESULTS_BASE }}/${{ matrix.form_code }}/merged/pr_comment.md`;
            if (!fs.existsSync(commentFile)) {
              console.log('No PR comment file found, skipping.');
              return;
            }
            const body = fs.readFileSync(commentFile, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4: Aggregate results and set final workflow status
  # ───────────────────────────────────────────────────────────────────────────
  aggregate-results:
    name: Aggregate Results
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()

    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: all-results/
          merge-multiple: false

      - name: Summarise all AI reports
        shell: python
        run: |
          import json, pathlib, sys

          all_bugs = []
          all_warnings = []
          statuses = []

          for report_file in pathlib.Path("all-results").glob("**/ai_bug_report.json"):
              try:
                  report = json.loads(report_file.read_text())
                  all_bugs.extend(report.get("bugs", []))
                  all_warnings.extend(report.get("warnings", []))
                  statuses.append(report.get("overallStatus", "NEEDS_REVIEW"))
              except Exception as e:
                  print(f"Warning: could not parse {report_file}: {e}", file=sys.stderr)

          final_status = "PASS"
          if "FAIL" in statuses:
              final_status = "FAIL"
          elif "NEEDS_REVIEW" in statuses:
              final_status = "NEEDS_REVIEW"

          print(f"Final status: {final_status}")
          print(f"Total bugs: {len(all_bugs)}")
          print(f"Total warnings: {len(all_warnings)}")

          critical = [b for b in all_bugs if b.get("severity") == "Critical"]
          high = [b for b in all_bugs if b.get("severity") == "High"]
          if critical:
              print(f"CRITICAL bugs ({len(critical)}):")
              for b in critical:
                  print(f"  [{b.get('id')}] {b.get('title')}")

          if final_status == "FAIL":
              sys.exit(1)

      - name: Upload aggregated summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-ai-report
          path: all-results/
          retention-days: 30
